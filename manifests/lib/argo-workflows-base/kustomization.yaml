apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo

resources:
  - workflowtemplate.yaml

# Variáveis que podem ser substituídas pelas apps
vars:
  - name: APP_NAME
    objref:
      kind: WorkflowTemplate
      name: ci-build
      apiVersion: argoproj.io/v1alpha1
    fieldref:
      fieldpath: metadata.name
  - name: REGISTRY_BASE
    objref:
      kind: WorkflowTemplate
      name: ci-build
      apiVersion: argoproj.io/v1alpha1
    fieldref:
      fieldpath: spec.templates[0].container.image
