apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argo

bases:
  - ../../lib/argo-workflows-base

namePrefix: app-finance-

# Patches para customizar a base com valores específicos da app
patches:
  - target:
      kind: WorkflowTemplate
      name: ci-build
    patch: |-
      - op: replace
        path: /metadata/name
        value: app-finance-build
      - op: replace
        path: /spec/templates/1/container/args/0
        value: "git clone git@github.com:growcodelabs/app-finance.git /workspace/app"
      - op: replace
        path: /spec/templates/1/initContainers/0/args/0
        value: "git clone git@github.com:growcodelabs/app-finance.git /workspace/app"
      - op: replace
        path: /spec/templates/2/container/args/2
        value: "--destination=registry.digitalocean.com/growcodelabs/app-finance:{{inputs.parameters.revision}}"
      - op: replace
        path: /spec/templates/2/container/args/3
        value: "--destination=registry.digitalocean.com/growcodelabs/app-finance:latest"
      - op: replace
        path: /spec/templates/2/container/args/5
        value: "--cache-repo=registry.digitalocean.com/growcodelabs/app-finance/cache"
