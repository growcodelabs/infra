---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-app-credentials-copier
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-app-credentials-copier
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["github-app-credentials"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-app-credentials-copier-reader
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-app-credentials-copier
subjects:
  - kind: ServiceAccount
    name: github-app-credentials-copier
    namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-app-credentials-writer
  namespace: argo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-app-credentials-copier-writer
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-app-credentials-writer
subjects:
  - kind: ServiceAccount
    name: github-app-credentials-copier
    namespace: argo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: copy-github-app-credentials
  namespace: argo
  annotations:
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      serviceAccountName: github-app-credentials-copier
      restartPolicy: OnFailure
      containers:
        - name: copier
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl get secret github-app-credentials -n argocd -o json \
                | jq '.metadata.namespace = "argo"' \
                | jq 'del(.metadata.resourceVersion)' \
                | jq 'del(.metadata.uid)' \
                | jq 'del(.metadata.creationTimestamp)' \
                | jq 'del(.metadata.annotations)' \
                | jq 'del(.metadata.labels)' \
                | kubectl apply -f -
