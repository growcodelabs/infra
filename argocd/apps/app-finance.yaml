---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-finance
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: apps
  source:
    repoURL: git@github.com:growcodelabs/infra.git
    targetRevision: HEAD
    path: manifests/apps
    plugin:
      name: cue
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true