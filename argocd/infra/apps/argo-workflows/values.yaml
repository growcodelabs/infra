crds:
  upgradeJob:
    image:
      repository: docker.io/bitnami/kubectl
      tag: latest

server:
  authModes:
    - server
  nodeSelector:
    workload: workflows
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt
      traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect-to-https@kubernetescrd,argo-argo-workflows-basic-auth@kubernetescrd
    hosts:
      - wf.growcodelabs.com
    tls:
      - hosts:
          - wf.growcodelabs.com
        secretName: argo-workflows-tls
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"

workflow:
  serviceAccount:
    create: true
  rbac:
    create: true

controller:
  workflowNamespaces:
    - argo
  nodeSelector:
    workload: workflows
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"
