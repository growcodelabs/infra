apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  sources:
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.5
      helm:
        valueFiles:
          - $values/argocd/infra/apps/traefik/values.yaml
    - repoURL: https://github.com/growcodelabs/infra.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/growcodelabs/infra.git
      targetRevision: main
      path: manifests/infra/traefik
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
